<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gohel Industries — Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--card:#1c2230;--border:#2d3748;--accent:#f59e0b;--accent2:#10b981;--danger:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;--text:#e2e8f0;--muted:#64748b;--yellow:#fbbf24;--radius:8px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}
#lockScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.lock-logo{width:160px;height:auto;margin-bottom:14px;border-radius:12px;}
.lock-co{font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;text-align:center;}
.lock-title{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:4px;}
.lock-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.pin-display{display:flex;gap:14px;margin-bottom:24px;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all 0.15s;}
.pin-dot.filled{background:var(--accent);border-color:var(--accent);}
.numpad{display:grid;grid-template-columns:repeat(3,78px);gap:10px;}
.num-btn{width:78px;height:78px;background:var(--card);border:1px solid var(--border);border-radius:50%;font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:600;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;transition:all 0.1s;}
.num-btn:active{background:var(--accent);color:var(--bg);transform:scale(0.94);}
.num-btn.del{font-size:18px;color:var(--muted);}
.num-btn.empty{background:transparent;border-color:transparent;pointer-events:none;}
.lock-err{color:var(--danger);font-size:13px;margin-top:12px;height:20px;text-align:center;}
.lock-sync{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);margin-top:10px;text-align:center;}
.lock-sync.ok{color:var(--accent2);}.lock-sync.err{color:var(--danger);}.lock-sync.loading{color:var(--yellow);}
#app{display:none;}
.topbar{background:var(--surface);border-bottom:3px solid var(--accent);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{height:38px;width:auto;border-radius:6px;}
.tb1{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;color:var(--accent);line-height:1.1;}
.tb2{font-size:10px;letter-spacing:1px;color:var(--muted);}
.topbar-right{display:flex;gap:8px;align-items:center;}
.clock{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--accent);letter-spacing:1px;}
.sync-pill{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;padding:4px 8px;border-radius:20px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--accent2);}
.sdot.syncing{background:var(--yellow);animation:pulse 1s infinite;}
.sdot.err{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.lock-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;padding:7px 12px;cursor:pointer;border-radius:var(--radius);}
.page{padding:14px;max-width:1000px;margin:0 auto;}
.tabs{display:flex;gap:3px;background:var(--surface);padding:4px;border-radius:var(--radius);margin-bottom:16px;flex-wrap:wrap;}
.tab{flex:1;min-width:60px;padding:9px 4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:transparent;border:none;border-radius:6px;cursor:pointer;transition:all 0.2s;white-space:nowrap;text-align:center;}
.tab.active{background:var(--accent);color:var(--bg);}
.sh{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sh::before{content:'';display:inline-block;width:4px;height:18px;background:var(--accent);border-radius:2px;}
.fc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.fl{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block;}
.fg{margin-bottom:14px;}
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:4px;}
.mat-btn{padding:12px 8px;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;text-align:center;}
.mat-btn .ml{display:block;width:32px;height:32px;border-radius:8px;margin:0 auto 6px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;line-height:32px;text-align:center;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.finput{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;padding:10px 12px;width:100%;outline:none;transition:border-color 0.2s;}
.finput:focus{border-color:var(--accent);}
.flabel{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.fgroup{display:flex;flex-direction:column;}
.btn-p{width:100%;padding:14px;background:var(--accent);border:none;border-radius:var(--radius);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:2px;color:var(--bg);cursor:pointer;margin-top:4px;}
.btn-p:active{transform:scale(0.98);}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:7px 12px;cursor:pointer;white-space:nowrap;}
.btn-green{background:var(--accent2);color:var(--bg);border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:7px 12px;cursor:pointer;white-space:nowrap;}
.btn-red{background:var(--danger);color:#fff;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:7px 12px;cursor:pointer;white-space:nowrap;}
.btn-orange{background:var(--orange);color:#fff;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:7px 12px;cursor:pointer;white-space:nowrap;}
.stock-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.fsel2{background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 10px;outline:none;cursor:pointer;}
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px;}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.2s;animation:sIn 0.25s ease;}
.stock-card.low{border-color:var(--danger);background:rgba(239,68,68,0.04);}
.stock-card.ok{border-color:var(--accent2);}
@keyframes sIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.sc-mat{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.sc-grade{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;margin-bottom:2px;}
.sc-dims{font-size:13px;color:var(--muted);margin-bottom:10px;}
.sc-qty{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.sc-qty-item{background:var(--surface);border-radius:6px;padding:8px 12px;text-align:center;flex:1;min-width:80px;}
.sc-qty-val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;color:var(--accent);line-height:1;}
.sc-qty-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);margin-top:2px;}
.sc-min{font-size:11px;color:var(--muted);margin-bottom:10px;}
.low-badge{background:rgba(239,68,68,0.15);color:var(--danger);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;}
.ok-badge{background:rgba(16,185,129,0.12);color:var(--accent2);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;}
.sc-actions{display:flex;gap:6px;flex-wrap:wrap;}
.sc-supplier{font-size:11px;color:var(--muted);margin-bottom:6px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:16px;}
.stat-c{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.stat-c .sl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.stat-c .sv{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--accent);}
.stat-c .ss{font-size:11px;color:var(--muted);margin-top:2px;}
.txn-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:6px;display:grid;grid-template-columns:90px 1fr 60px 70px 80px;gap:8px;align-items:center;font-size:13px;}
.txn-row.hdr{background:var(--surface);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.txn-in{color:var(--accent2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;}
.txn-out{color:var(--danger);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;}
.txn-mat{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;}
.export-btn{background:var(--surface);border:1px solid var(--border);color:var(--accent2);font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;padding:8px 14px;border-radius:6px;cursor:pointer;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:480px;}
.modal h3{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;margin-bottom:16px;color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.manage-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.add-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.tinput{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;padding:9px 12px;flex:1;min-width:140px;outline:none;}
.tinput:focus{border-color:var(--accent);}
.badd{background:var(--accent2);border:none;border-radius:var(--radius);color:var(--bg);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;padding:9px 18px;cursor:pointer;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent2);color:var(--bg);font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:1px;padding:11px 24px;border-radius:50px;z-index:9998;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}.toast.error{background:var(--danger);color:#fff;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.empty .big{font-size:40px;margin-bottom:10px;}
@media(max-width:600px){.form-row,.form-row-3{grid-template-columns:1fr;}.txn-row{grid-template-columns:1fr 1fr;font-size:12px;}}
</style>
</head>

      <div><div class="tb1">GOHEL INDUSTRIES</div><div class="tb2">Raw Material Inventory Tracker</div></div>

    <div class="topbar-right">
      <div class="sync-pill"><span class="sdot" id="sdot"></span><span id="stxt" style="color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;">SYNCED</span></div>
      <div class="clock" id="clk"></div>
      <button class="lock-btn" onclick="lockApp()">Lock</button>
    </div>
  </div>
  <div class="page">
    <div class="tabs">
      <button class="tab active" onclick="st('stock')">Stock</button>
      <button class="tab" onclick="st('add')">+ Add</button>
      <button class="tab" onclick="st('use')">Use</button>
      <button class="tab" onclick="st('log')">Log</button>
      <button class="tab" onclick="st('manage')">Manage</button>
    </div>

    <div id="tab-stock">
      <div class="sh">Current Stock</div>
      <div class="stats-row" id="stockStats"></div>
      <div class="stock-filters">
        <select class="fsel2" id="filterMat" onchange="renderStock()"><option value="">All Materials</option></select>
        <select class="fsel2" id="filterStatus" onchange="renderStock()">
          <option value="">All Status</option>
          <option value="low">Low Stock Only</option>
          <option value="ok">Sufficient Only</option>
        </select>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
      <div class="stock-grid" id="stockGrid"></div>
    </div>

    <div id="tab-add" style="display:none">
      <div class="sh">Add New Stock</div>
      <div class="fc">
        <div class="fg">
          <label class="fl">Material Type</label>
          <div class="mat-grid" id="matTypeGrid"></div>
        </div>
        <div class="form-row">
          <div class="fgroup"><label class="flabel">Grade / Specification</label><input type="text" class="finput" id="addGrade" placeholder="e.g. IS319, 6061, 316L"></div>
          <div class="fgroup"><label class="flabel">Supplier Name</label><input type="text" class="finput" id="addSupplier" placeholder="e.g. Shah Metals"></div>
        </div>
        <div class="form-row-3">
          <div class="fgroup"><label class="flabel">Diameter (mm)</label><input type="number" class="finput" id="addDia" placeholder="e.g. 25"></div>
          <div class="fgroup"><label class="flabel">Length (mm)</label><input type="number" class="finput" id="addLen" placeholder="e.g. 3000"></div>
          <div class="fgroup"><label class="flabel">Price per Kg (Rs)</label><input type="number" class="finput" id="addPrice" placeholder="e.g. 450"></div>
        </div>
        <div class="form-row">
          <div class="fgroup"><label class="flabel">Quantity (Pieces)</label><input type="number" class="finput" id="addQtyPcs" placeholder="e.g. 20"></div>
          <div class="fgroup"><label class="flabel">Weight (Kg)</label><input type="number" class="finput" id="addQtyKg" placeholder="e.g. 45.5"></div>
        </div>
        <div class="form-row">
          <div class="fgroup"><label class="flabel">Min Stock Alert (Pieces)</label><input type="number" class="finput" id="addMinPcs" placeholder="e.g. 5"></div>
          <div class="fgroup"><label class="flabel">Note (optional)</label><input type="text" class="finput" id="addNote" placeholder="e.g. Invoice #42"></div>
        </div>
        <button class="btn-p" onclick="addStock()">ADD TO STOCK</button>
      </div>
    </div>

    <div id="tab-use" style="display:none">
      <div class="sh">Use / Consume Stock</div>
      <div class="stock-grid" id="useStockGrid"></div>
    </div>

    <div id="tab-log" style="display:none">
      <div class="sh">Transaction Log</div>
      <div class="stock-filters">
        <select class="fsel2" id="logFilterMat" onchange="renderLog()"><option value="">All Materials</option></select>
        <select class="fsel2" id="logFilterType" onchange="renderLog()">
          <option value="">All Types</option>
          <option value="IN">Stock In</option>
          <option value="OUT">Stock Out</option>
        </select>
        <select class="fsel2" id="logFilterDate" onchange="renderLog()"><option value="">All Dates</option></select>

<div class="toast" id="toast"></div>
<script>
const GH_TOKEN = ['ghp_dkqVfKuSeGsVv25Ne','ba35J4PAgoNpn0A9xw7'].join('');
const GH_USER = 'gohelnishidh';
const GH_REPO = 'gohel-industries-work-tracker';
const GH_FILE = 'inventory.json';
const GH_API = 'https://api.github.com/repos/'+GH_USER+'/'+GH_REPO+'/contents/'+GH_FILE;

const DEF = {
  pin:'1234',
  matTypes:[
    {name:'Brass',color:'#f59e0b'},
    {name:'Aluminium',color:'#3b82f6'},
    {name:'Stainless Steel',color:'#10b981'},
    {name:'Mild Steel',color:'#64748b'},
    {name:'Copper',color:'#f97316'},
    {name:'Special Alloy',color:'#8b5cf6'}
  ],
  stock:[],
  log:[]
};

let S = JSON.parse(localStorage.getItem('gohel_inv4')||'null') || JSON.parse(JSON.stringify(DEF));
let fileSHA = localStorage.getItem('gohel_inv4_sha') || null;
let selMat = null;
let useItemId = null;
let pin = '';
let syncTimer = null;

function setSI(s,m){
  var dot=document.getElementById('sdot');
  var txt=document.getElementById('stxt');
  var ls=document.getElementById('lockSync');
  if(dot){dot.className='sdot'+(s==='ok'?'':s==='err'?' err':' syncing');}
  if(txt){txt.textContent=m.toUpperCase();}
  if(ls){ls.textContent='● '+m;ls.className='lock-sync '+(s==='ok'?'ok':s==='err'?'err':'loading');}
}

async function ghLoad(){
  setSI('syncing','Loading...');
  try{
    var r=await fetch(GH_API,{headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===404){setSI('ok','Ready');await ghSave();return;}
    var d=await r.json();
    fileSHA=d.sha;
    localStorage.setItem('gohel_inv4_sha',fileSHA);
    var raw=atob(d.content.replace(/\n/g,''));
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);
    S=JSON.parse(new TextDecoder('utf-8').decode(bytes));
    if(!S.matTypes)S.matTypes=DEF.matTypes;
    if(!S.stock)S.stock=[];
    if(!S.log)S.log=[];
    localStorage.setItem('gohel_inv4',JSON.stringify(S));
    setSI('ok','Synced');
  }catch(e){setSI('err','Offline');console.error(e);}
}

async function ghSave(){
  setSI('syncing','Saving...');
  localStorage.setItem('gohel_inv4',JSON.stringify(S));
  try{
    var jsonStr=JSON.stringify(S,null,2);
    var bytes=new TextEncoder().encode(jsonStr);
    var binStr=Array.from(bytes).map(function(b){return String.fromCharCode(b);}).join('');
    var b64=btoa(binStr);
    var body={message:'inv update '+new Date().toISOString(),content:b64};
    if(fileSHA)body.sha=fileSHA;
    var r=await fetch(GH_API,{method:'PUT',headers:{'Authorization':'token '+GH_TOKEN,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    var d=await r.json();
    if(d.content&&d.content.sha){
      fileSHA=d.content.sha;
      localStorage.setItem('gohel_inv4_sha',fileSHA);
      setSI('ok','Synced');
    }else{setSI('err','Save failed');}
  }catch(e){setSI('err','Offline');}
}

function startAutoSync(){syncTimer=setInterval(function(){ghLoad().then(renderAll);},30000);}
function stopAutoSync(){clearInterval(syncTimer);}

function pinPress(d){
  if(pin.length>=4)return;
  pin+=d;
  updateDots();
  if(pin.length===4)setTimeout(checkPin,140);
}
function pinDel(){pin=pin.slice(0,-1);updateDots();}
function updateDots(){
  for(var i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled',i<pin.length);
  }
}
async function checkPin(){
  if(pin===S.pin){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('app').style.display='block';
    await ghLoad();
    initApp();
    startAutoSync();
  }else{
    document.getElementById('lockErr').textContent='Wrong PIN. Try again.';
    pin='';
    updateDots();
    setTimeout(function(){document.getElementById('lockErr').textContent='';},2000);
  }
}
function lockApp(){
  stopAutoSync();
  pin='';
  updateDots();
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('app').style.display='none';
}

setInterval(function(){
  var n=new Date();
  var el=document.getElementById('clk');
  if(el)el.textContent=n.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}).toUpperCase();
},1000);

function today(){return new Date().toLocaleDateString('en-IN');}
function nowT(){var n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function fmtDims(item){var d=[];if(item.diameter)d.push('Dia: '+item.diameter+'mm');if(item.length)d.push('L: '+item.length+'mm');return d.join(' · ');}
function getMatColor(name){var m=S.matTypes.find(function(x){return x.name===name;});return m?m.color:'#64748b';}
function isLow(item){if(!item.minPcs||!item.qtyPcs)return false;return parseFloat(item.qtyPcs)<=parseFloat(item.minPcs);}

function initApp(){selMat=null;renderAll();renderMatGrid();}
function renderAll(){renderStock();renderUseGrid();renderLog();renderManage();renderStats();}

function renderMatGrid(){
  var g=document.getElementById('matTypeGrid');
  if(!g)return;
  g.innerHTML=S.matTypes.map(function(m,i){
    var active=selMat===i;
    var style=active?'background:'+m.color+';border-color:'+m.color+';color:#0d1117':'border-color:'+m.color+'60;color:'+m.color;
    var mlStyle=active?'background:rgba(0,0,0,0.2);color:#0d1117':'background:'+m.color+'30;color:'+m.color;
    return '<div class="mat-btn" onclick="swM('+i+')" style="'+style+'"><span class="ml" style="'+mlStyle+'">'+m.name.charAt(0)+'</span>'+m.name+'</div>';
  }).join('');
}
function swM(i){selMat=i;renderMatGrid();}

function renderStats(){
  var el=document.getElementById('stockStats');if(!el)return;
  var totalItems=S.stock.length;
  var lowItems=S.stock.filter(function(s){return isLow(s);}).length;
  var totalKg=S.stock.reduce(function(s,x){return s+parseFloat(x.qtyKg||0);},0);
  var totalVal=S.stock.reduce(function(s,x){return s+(parseFloat(x.qtyKg||0)*parseFloat(x.pricePerKg||0));},0);
  el.innerHTML=
    '<div class="stat-c"><div class="sl">Total Items</div><div class="sv">'+totalItems+'</div><div class="ss">in stock</div></div>'+
    '<div class="stat-c"><div class="sl">Low Stock</div><div class="sv" style="color:'+(lowItems>0?'var(--danger)':'var(--accent2)')+'">'+lowItems+'</div><div class="ss">need restock</div></div>'+
    '<div class="stat-c"><div class="sl">Total Weight</div><div class="sv">'+totalKg.toFixed(1)+'</div><div class="ss">kg</div></div>'+
    '<div class="stat-c"><div class="sl">Stock Value</div><div class="sv" style="font-size:18px">Rs '+totalVal.toFixed(0)+'</div><div class="ss">approx</div></div>';
}

function renderStock(){
  var el=document.getElementById('stockGrid');if(!el)return;
  var fm=document.getElementById('filterMat');
  var fs=document.getElementById('filterStatus');
  var mats=[];
  S.stock.forEach(function(s){if(mats.indexOf(s.material)<0)mats.push(s.material);});
  if(fm){
    var sv=fm.value;
    fm.innerHTML='<option value="">All Materials</option>'+mats.map(function(m){return'<option value="'+m+'"'+(sv===m?' selected':'')+'>'+m+'</option>';}).join('');
  }
  var items=S.stock.slice();
  if(fm&&fm.value)items=items.filter(function(s){return s.material===fm.value;});
  if(fs&&fs.value==='low')items=items.filter(function(s){return isLow(s);});
  if(fs&&fs.value==='ok')items=items.filter(function(s){return!isLow(s);});
  if(!items.length){el.innerHTML='<div class="empty"><div class="big">📦</div>No stock found. Add materials using the + Add Stock tab.</div>';return;}
  el.innerHTML=items.map(function(item){
    var low=isLow(item);
    var c=getMatColor(item.material);
    return '<div class="stock-card '+(low?'low':'ok')+'">'
      +'<div class="sc-mat" style="color:'+c+'">'+item.material+'</div>'
      +'<div class="sc-grade">'+(item.grade||'—')+'</div>'
      +'<div class="sc-dims">'+fmtDims(item)+'</div>'
      +(item.supplier?'<div class="sc-supplier">Supplier: '+item.supplier+'</div>':'')
      +'<div class="sc-qty">'
        +'<div class="sc-qty-item"><div class="sc-qty-val" style="color:'+(low?'var(--danger)':'var(--accent)')+'">'+( item.qtyPcs||0)+'</div><div class="sc-qty-lbl">PIECES</div></div>'
        +'<div class="sc-qty-item"><div class="sc-qty-val" style="color:'+(low?'var(--danger)':'var(--accent)')+'">'+parseFloat(item.qtyKg||0).toFixed(1)+'</div><div class="sc-qty-lbl">KG</div></div>'
        +(item.pricePerKg?'<div class="sc-qty-item"><div class="sc-qty-val" style="font-size:16px;color:var(--blue)">Rs '+item.pricePerKg+'</div><div class="sc-qty-lbl">PER KG</div></div>':'')
      +'</div>'
      +(item.minPcs?'<div class="sc-min">Min alert: '+item.minPcs+' pcs</div>':'')
      +(low?'<div class="low-badge">LOW STOCK</div>':'<div class="ok-badge">SUFFICIENT</div>')
      +'<div class="sc-actions">'
        +'<button class="btn-orange" onclick="openUseModal(\''+item.id+'\')">USE</button>'
        +'<button class="btn-green" onclick="openRestock(\''+item.id+'\')">+ RESTOCK</button>'
        +'<button class="btn-blue" onclick="openEdit(\''+item.id+'\')">EDIT</button>'
        +'<button class="btn-red" onclick="deleteItem(\''+item.id+'\')">X</button>'
      +'</div>'
    +'</div>';
  }).join('');
}

async function addStock(){
  if(selMat===null)return toast('Select a material type','error');
  var grade=document.getElementById('addGrade').value.trim();
  var pcs=document.getElementById('addQtyPcs').value;
  var kg=document.getElementById('addQtyKg').value;
  if(!grade)return toast('Enter grade/specification','error');
  if(!pcs&&!kg)return toast('Enter quantity','error');
  var item={
    id:Date.now().toString(),
    material:S.matTypes[selMat].name,
    grade:grade,
    diameter:document.getElementById('addDia').value||'',
    length:document.getElementById('addLen').value||'',
    pricePerKg:document.getElementById('addPrice').value||'',
    supplier:document.getElementById('addSupplier').value.trim()||'',
    qtyPcs:parseFloat(pcs)||0,
    qtyKg:parseFloat(kg)||0,
    minPcs:parseFloat(document.getElementById('addMinPcs').value)||0,
    addedDate:today()
  };
  var note=document.getElementById('addNote').value.trim();
  S.stock.push(item);
  S.log.unshift({id:Date.now(),type:'IN',material:item.material,grade:item.grade,diameter:item.diameter,length:item.length,qtyPcs:item.qtyPcs,qtyKg:item.qtyKg,supplier:item.supplier,note:note,date:today(),time:nowT()});
  ['addGrade','addSupplier','addDia','addLen','addPrice','addQtyPcs','addQtyKg','addMinPcs','addNote'].forEach(function(id){document.getElementById(id).value='';});
  selMat=null;renderMatGrid();
  toast('Stock added');renderAll();await ghSave();
}

function renderUseGrid(){
  var el=document.getElementById('useStockGrid');if(!el)return;
  if(!S.stock.length){el.innerHTML='<div class="empty"><div class="big">📦</div>No stock available.</div>';return;}
  el.innerHTML=S.stock.map(function(item){
    var low=isLow(item);
    var c=getMatColor(item.material);
    return '<div class="stock-card '+(low?'low':'ok')+'" style="cursor:pointer" onclick="openUseModal(\''+item.id+'\')">'
      +'<div class="sc-mat" style="color:'+c+'">'+item.material+'</div>'
      +'<div class="sc-grade">'+(item.grade||'—')+'</div>'
      +'<div class="sc-dims">'+fmtDims(item)+'</div>'
      +'<div class="sc-qty">'
        +'<div class="sc-qty-item"><div class="sc-qty-val">'+( item.qtyPcs||0)+'</div><div class="sc-qty-lbl">PIECES</div></div>'
        +'<div class="sc-qty-item"><div class="sc-qty-val">'+parseFloat(item.qtyKg||0).toFixed(1)+'</div><div class="sc-qty-lbl">KG</div></div>'
      +'</div>'
      +(low?'<div class="low-badge">LOW STOCK</div>':'<div class="ok-badge">TAP TO USE</div>')
    +'</div>';
  }).join('');

function openUseModal(id){
  var item=S.stock.find(function(s){return s.id===id;});if(!item)return;
  useItemId=id;
  document.getElementById('useModalMatInfo').innerHTML='<strong>'+item.material+' · '+(item.grade||'')+'</strong> · '+fmtDims(item)+'<br>Available: <strong>'+item.qtyPcs+' pcs</strong> · <strong>'+parseFloat(item.qtyKg||0).toFixed(1)+' kg</strong>';
  document.getElementById('usePcs').value='';
  document.getElementById('useKg').value='';
  document.getElementById('useJob').value='';
  document.getElementById('useModal').classList.add('open');
}
function closeModal(){document.getElementById('useModal').classList.remove('open');useItemId=null;}

async function confirmUse(){
  var item=S.stock.find(function(s){return s.id===useItemId;});if(!item)return;
  var pcs=parseFloat(document.getElementById('usePcs').value)||0;
  var kg=parseFloat(document.getElementById('useKg').value)||0;
  if(!pcs&&!kg)return toast('Enter pieces or kg used','error');
  if(pcs>item.qtyPcs)return toast('Not enough pieces!','error');
  if(kg>item.qtyKg)return toast('Not enough kg!','error');
  item.qtyPcs=Math.max(0,item.qtyPcs-pcs);
  item.qtyKg=Math.max(0,item.qtyKg-kg);
  var job=document.getElementById('useJob').value.trim();
  S.log.unshift({id:Date.now(),type:'OUT',material:item.material,grade:item.grade,diameter:item.diameter,length:item.length,qtyPcs:pcs,qtyKg:kg,job:job,date:today(),time:nowT()});
  closeModal();
  toast('Used '+item.material+' '+item.grade);
  renderAll();await ghSave();
}

    return '<div class="manage-item">'
      +'<span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:'+m.color+';margin-right:8px;vertical-align:middle"></span><strong>'+m.name+'</strong></span>'
      +'<button class="btn-red" onclick="rmMat('+i+')">Remove</button>'
    +'</div>';
  }).join('');
}
async function addMatType(){
  var n=document.getElementById('newMatName').value.trim();
  var c=document.getElementById('newMatColor').value.trim()||'#64748b';
  if(!n)return toast('Enter material name','error');
  S.matTypes.push({name:n,color:c});
  document.getElementById('newMatName').value='';
  document.getElementById('newMatColor').value='';
  renderManage();renderMatGrid();toast('Material added');await ghSave();
}
async function rmMat(i){S.matTypes.splice(i,1);renderManage();renderMatGrid();await ghSave();}
async function changePin(){
  var p=document.getElementById('newPin').value.trim();
  if(p.length!==4||isNaN(p))return toast('PIN must be 4 digits','error');
  S.pin=p;document.getElementById('newPin').value='';
  toast('PIN updated');await ghSave();
}
async function clearAll(){
  if(!confirm('Clear ALL stock and log?'))return;
  S.stock=[];S.log=[];renderAll();await ghSave();toast('Cleared');
}

function exportCSV(){
  var rows=[['Material','Grade','Diameter(mm)','Length(mm)','Supplier','Pieces','Kg','Price/Kg','Min Alert','Added']];
  S.stock.forEach(function(s){rows.push([s.material,s.grade,s.diameter,s.length,s.supplier,s.qtyPcs,s.qtyKg,s.pricePerKg,s.minPcs,s.addedDate]);});
  dlCSV(rows,'gohel_stock_'+today().split('/').join('-')+'.csv');
}
function exportLogCSV(){
  var rows=[['Date','Time','Type','Material','Grade','Diameter','Length','Pieces','Kg','Job']];
  S.log.forEach(function(l){rows.push([l.date,l.time||'',l.type,l.material,l.grade||'',l.diameter||'',l.length||'',l.qtyPcs||'',l.qtyKg||'',l.job||l.note||'']);});
  dlCSV(rows,'gohel_inv_log_'+today().split('/').join('-')+'.csv');
}
function dlCSV(rows,name){
  var csv=rows.map(function(r){return r.map(function(v){return'"'+(v||'')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=name;a.click();
}

function st(t){
  ['stock','add','use','log','manage'].forEach(function(n){
    document.getElementById('tab-'+n).style.display=n===t?'block':'none';
  });
  document.querySelectorAll('.tab').forEach(function(b,i){
    b.classList.toggle('active',['stock','add','use','log','manage'][i]===t);
  });
  if(t==='stock'){renderStock();renderStats();}
  if(t==='add')renderMatGrid();
  if(t==='use')renderUseGrid();
  if(t==='log')renderLog();
  if(t==='manage')renderManage();
}

function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type==='error'?' error':'');
  setTimeout(function(){t.className='toast';},2500);
}

ghLoad().then(function(){updateDots();});
</script></body></html>
